name: Smoke test published packages

on:
  workflow_run:
    workflows: ["Publish to npm", "Publish to PyPI"]
    types: [completed]
  workflow_dispatch:

jobs:
  npm:
    name: npm install & smoke test
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install from npm
        run: npm install -g @dbsketch/cli

      - name: Verify version output
        run: dbsketch --help

      - name: Smoke test — DBML input produces diagram
        run: |
          cat <<'EOF' > /tmp/test.dbml
          Table users {
            id int [pk]
            email varchar
          }
          Table posts {
            id int [pk]
            user_id int [ref: > users.id]
            title varchar
          }
          EOF
          output=$(dbsketch /tmp/test.dbml)
          echo "$output"
          echo "$output" | grep -q '╭' || { echo "FAIL: expected box-drawing output"; exit 1; }

      - name: Smoke test — SQL input produces diagram
        run: |
          cat <<'EOF' > /tmp/test.sql
          CREATE TABLE users (id INTEGER PRIMARY KEY, email TEXT);
          CREATE TABLE posts (
            id INTEGER PRIMARY KEY,
            user_id INTEGER REFERENCES users(id),
            title TEXT
          );
          EOF
          output=$(dbsketch /tmp/test.sql)
          echo "$output"
          echo "$output" | grep -q '╭' || { echo "FAIL: expected box-drawing output"; exit 1; }

  pip:
    name: pip install & smoke test
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install from PyPI
        run: pip install dbsketch

      - name: Verify help output
        run: dbsketch --help

      - name: Smoke test — DBML input produces diagram
        run: |
          cat <<'EOF' > /tmp/test.dbml
          Table users {
            id int [pk]
            email varchar
          }
          Table posts {
            id int [pk]
            user_id int [ref: > users.id]
            title varchar
          }
          EOF
          output=$(dbsketch /tmp/test.dbml)
          echo "$output"
          echo "$output" | grep -q '╭' || { echo "FAIL: expected box-drawing output"; exit 1; }

      - name: Smoke test — SQL input produces diagram
        run: |
          cat <<'EOF' > /tmp/test.sql
          CREATE TABLE users (id INTEGER PRIMARY KEY, email TEXT);
          CREATE TABLE posts (
            id INTEGER PRIMARY KEY,
            user_id INTEGER REFERENCES users(id),
            title TEXT
          );
          EOF
          output=$(dbsketch /tmp/test.sql)
          echo "$output"
          echo "$output" | grep -q '╭' || { echo "FAIL: expected box-drawing output"; exit 1; }
