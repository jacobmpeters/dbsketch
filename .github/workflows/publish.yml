name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v0.1.0)'
        required: true

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      # Publish in dependency order. pnpm rewrites workspace:* to real
      # version ranges automatically during publish.
      - run: pnpm publish --filter @dbsketch/parser --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_DBSKETCH }}

      - run: pnpm publish --filter @dbsketch/layout --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_DBSKETCH }}

      - run: pnpm publish --filter @dbsketch/render --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_DBSKETCH }}

      - run: pnpm publish --filter @dbsketch/core --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_DBSKETCH }}

      - run: pnpm publish --filter @dbsketch/cli --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_DBSKETCH }}
