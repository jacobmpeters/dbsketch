name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # required for Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Bundle CLI
        run: pnpm --filter @dbsketch/cli bundle
        # outputs packages/pypi/dbsketch/_bin/cli.cjs

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 -c "
          import re, pathlib
          p = pathlib.Path('packages/pypi/pyproject.toml')
          p.write_text(re.sub(r'(?m)^version = \"[^\"]+\"', f'version = \"{VERSION}\"', p.read_text(), count=1))
          p2 = pathlib.Path('packages/pypi/dbsketch/__init__.py')
          p2.write_text(re.sub(r'__version__ = \"[^\"]+\"', f'__version__ = \"{VERSION}\"', p2.read_text()))
          "

      - name: Build wheel
        run: |
          pip install build
          cd packages/pypi
          python -m build --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pypi/dist/
